name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Sync & Invalidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::072988571347:role/gauravkarkidmi-github-actions
          aws-region: eu-north-1

      - name: Sync static files to S3
        run: |
          aws s3 sync . s3://gauravkarkidmi-website-072988571347 \
            --delete \
            --exclude "*" \
            --exclude ".git/*" \
            --exclude ".claude/*" \
            --exclude "terraform/*" \
            --exclude ".github/*" \
            --include "*.html" \
            --include "*.css" \
            --include "images/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E331CKNCFCURYX \
            --paths "/*"
